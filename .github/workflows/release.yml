name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Create plugin package
        run: |
          PLUGIN_SLUG="wooc-bundle-gia70"
          BUILD_DIR="build"
          
          # Crea directory di build
          mkdir -p $BUILD_DIR/$PLUGIN_SLUG
          
          # Copia i file del plugin (con nome cartella corretto)
          rsync -av \
            --exclude='.git' \
            --exclude='.gitignore' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='build' \
            --exclude='releases' \
            --exclude='*.sh' \
            --exclude='.DS_Store' \
            ./ $BUILD_DIR/$PLUGIN_SLUG/
          
          # Crea ZIP
          cd $BUILD_DIR
          zip -r ../${PLUGIN_SLUG}-v${{ steps.get_version.outputs.VERSION }}.zip $PLUGIN_SLUG/
          cd ..
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: Release v${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: wooc-bundle-gia70-v${{ steps.get_version.outputs.VERSION }}.zip
          body: |
            ## WooC Bundle gIA70 v${{ steps.get_version.outputs.VERSION }}
            
            Download del plugin per WordPress/WooCommerce.
            
            ### 📦 Installazione
            1. Scarica il file ZIP qui sotto
            2. In WordPress: Plugin → Aggiungi nuovo → Carica plugin
            3. Seleziona il file ZIP e installa
            
            ### 📝 Changelog
            Vedi [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) per i dettagli.
